# Classifier — can be scaled horizontally; each pod is a Redis consumer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier
  namespace: telegram-sorter
  labels:
    app: classifier
spec:
  replicas: 1       # increase if the queue grows faster than it's consumed
  selector:
    matchLabels:
      app: classifier
  template:
    metadata:
      labels:
        app: classifier
    spec:
      containers:
        - name: classifier
          image: YOUR_REGISTRY/telegram-sorter:latest
          imagePullPolicy: Always
          env:
            - name: SERVICE
              value: "classifier"
            - name: REDIS_URL
              value: "redis://redis:6379"
          envFrom:
            - secretRef:
                name: telegram-sorter-secrets
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: telegram-sorter-config

